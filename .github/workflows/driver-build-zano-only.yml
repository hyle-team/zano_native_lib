name: Driver build all sequentially

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-sequential-workflows:
    runs-on: ubuntu-latest

    env:
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
      REF: main
      GH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}

    steps:
      - name: Check token exists
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing secret WORKFLOW_DISPATCH_TOKEN"
            exit 1
          fi

      - name: Trigger workflows one by one and wait
        shell: bash
        run: |
          set -euo pipefail

          workflows=(
            "libzano-ios.yml"
            "libzano-android.yml"
          )

          api="https://api.github.com/repos/${OWNER}/${REPO}"

          trigger_workflow() {
            local workflow_file="$1"

            echo "==> Triggering ${workflow_file} on ref ${REF}"

            curl --fail --silent --show-error \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${api}/actions/workflows/${workflow_file}/dispatches" \
              -d "$(jq -nc --arg ref "${REF}" '{ref:$ref}')"

            echo "Triggered ${workflow_file}"
          }

          get_latest_run_id_after_trigger() {
            local workflow_file="$1"
            local since_iso="$2"

            curl --silent \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${api}/actions/workflows/${workflow_file}/runs?event=workflow_dispatch&branch=${REF}&per_page=20" \
              | jq -r --arg since "${since_iso}" '
                  .workflow_runs
                  | map(select(.created_at >= $since))
                  | sort_by(.created_at)
                  | reverse
                  | .[0].id // empty
                '
          }

          wait_for_run_to_appear() {
            local workflow_file="$1"
            local since_iso="$2"
            local run_id=""

            for attempt in $(seq 1 30); do
              run_id="$(get_latest_run_id_after_trigger "${workflow_file}" "${since_iso}")"
              if [ -n "${run_id}" ]; then
                echo "${run_id}"
                return 0
              fi

              echo "Waiting for ${workflow_file} run to appear... attempt ${attempt}"
              sleep 5
            done

            echo "::error::Could not find queued run for ${workflow_file}"
            return 1
          }

          wait_for_run_completion() {
            local workflow_file="$1"
            local run_id="$2"

            echo "==> Waiting for ${workflow_file} run ${run_id} to finish"

            while true; do
              response="$(
                curl --silent \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  "${api}/actions/runs/${run_id}"
              )"

              status="$(echo "${response}" | jq -r '.status')"
              conclusion="$(echo "${response}" | jq -r '.conclusion // ""')"
              html_url="$(echo "${response}" | jq -r '.html_url // ""')"

              echo "Run ${run_id}: status=${status}, conclusion=${conclusion}"

              if [ "${status}" = "completed" ]; then
                if [ "${conclusion}" = "success" ]; then
                  echo "Workflow ${workflow_file} finished successfully"
                  echo "${html_url}"
                  return 0
                fi

                echo "::error::Workflow ${workflow_file} failed with conclusion=${conclusion}"
                echo "Run URL: ${html_url}"
                return 1
              fi

              sleep 10
            done
          }

          for workflow_file in "${workflows[@]}"; do
            since_iso="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

            trigger_workflow "${workflow_file}"

            # Give GitHub a moment to register the run before searching for it.
            sleep 3

            run_id="$(wait_for_run_to_appear "${workflow_file}" "${since_iso}")"
            wait_for_run_completion "${workflow_file}" "${run_id}"
          done

          echo "All workflows completed successfully"
