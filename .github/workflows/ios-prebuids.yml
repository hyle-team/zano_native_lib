name: "Build iOS prebuilds"

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 2
      - name: Configure git
        run: |
          # Set git credentials
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@zano.org"
      - name: Build
        run: |
          (cd Zano && git tag -a v1.0 -m build HEAD^1)
          ./build_ios_libs.sh
      - name: Aquire push lock
        run: |
          attempt=0
          while git ls-remote --exit-code --heads origin push-lock >/dev/null 2>&1 > /dev/null 2>&1; do
            echo "[$(date)]: Waiting for push lock to end"
            sleep 5
            attempt=$((attempt+1))
            if [ $attempt -ge 12 ]; then
              echo "Timeout exceeded"
              exit 1
            fi
          done
          git push origin HEAD:push-lock
      - name: Commit and push artifacts
        run: |
          # Fetch latest changes from remote
          echo "[INFO] Pulling latest changes from remote..."
          git pull

          # Commit if there are changes (even without changes)
          echo "[INFO] Commiting changes"
          git add .
          git commit --allow-empty -m "[AUTO] build ios from ${{ github.sha }}"

          # Check if branch has upstream tracking
          echo "[INFO] Pushing changes"
          git push
      - name: Release push lock
        run: |
          git push origin :push-lock
