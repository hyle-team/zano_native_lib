name: "Build libopenssl Android prebuilds"

on:
  workflow_dispatch:
concurrency:
  group: push-artifacts-group

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          fetch-depth: 2
      - name: Configure git
        run: |
          # Set git credentials
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@zano.org"
      - name: Build
        run: |
          ./thirdparty/build-openssl-android.sh
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: Commit and push artifacts
        run: |
          # Fetch latest changes from remote
          echo "[INFO] Pulling latest changes from remote..."
          git pull

          # Commit if there are changes (even without changes)
          echo "[INFO] Commiting changes"
          git add .
          git commit --allow-empty -m "[AUTO] build libopenssl android from ${{ github.sha }}"

          # Check if branch has upstream tracking
          echo "[INFO] Pushing changes"
          git push
