name: "Build all iOS"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  libboost-ios:
    name: Build libboost iOS prebuilds
    uses: ./.github/workflows/libboost-ios.yml
    secrets: inherit

  libopenssl-ios:
    name: Build libopenssl iOS prebuilds
    uses: ./.github/workflows/libopenssl-ios.yml
    secrets: inherit

  libzano-ios:
    name: Build libzano iOS prebuilds
    needs:
      - libopenssl-ios
      - libboost-ios
    uses: ./.github/workflows/libzano-ios.yml    
    secrets: inherit
