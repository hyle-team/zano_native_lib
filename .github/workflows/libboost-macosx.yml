name: "25 - libboost MacOSX prebuilds"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-libboost-macosx:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1
          submodules: false
      - name: Cache Boost sources
        uses: actions/cache@v4
        with:
          path: ./thirdparty/boost/boost*.tar.gz
          key: boost-1.76.0
      - name: Load env
        uses: ./.github/actions/env
      - name: Build
        run: ./thirdparty/boost/macosx/build.sh
      - name: Configure git and stage artifacts for push
        uses: ./.github/actions/artifacts
        with:
          folder: thirdparty/boost/macosx
          name: libboost macosx
