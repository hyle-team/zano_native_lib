name: "25 - libopenssl MacOSX prebuilds"

on:
  workflow_dispatch:
  workflow_call:
concurrency:
  group: push-artifacts-group

jobs:
  build-libopenssl-macosx:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1
          submodules: false
      - name: Cache OpenSSL sources
        uses: actions/cache@v4
        with:
          path: ./thirdparty/openssl/openssl*.tar.gz
          key: openssl-3.1.8
      - name: Load env
        uses: ./.github/actions/env
      - name: Build
        run: ./thirdparty/openssl/macosx/build.sh
      - name: Configure git and stage artifacts for push
        uses: ./.github/actions/artifacts
        with:
          folder: thirdparty/openssl/macosx
          name: libopenssl macosx
